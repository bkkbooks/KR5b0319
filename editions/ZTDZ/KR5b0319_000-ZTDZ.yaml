body:
  text: 萬物之元首也故曰天首二名彌玄上山其山無邊可尋無上無下可至故曰彌玄三名羅玄洞虛山其山無所不在所在皆無故曰羅玄四名髙上眞元山其山爲萬聖宗會故曰髙上五名衆寳幽劫刄山其山法法是寳深淺並見故曰衆寳六名無色大覺山其山妙覺無相故曰無色七名周觀洞玄山其山大明無際故曰周觀八名景華太眞山其山一體華光液液故曰景華九名不思議山其山眞空非思慮所到故曰不思議十名太玄都玉京太上山其山人法不二以淨爲體故曰太玄山者身也亦太上身也然知此名下㫖自與法同名體俱合故入仙録也七寳華葉山樹境界枝條莖葉土石臺觀皆是七寳華葉皆是上清三洞道德等經文字章解俱三十六部經兆能湌食自成金華仙人勸令咽味靈寳清觴境隨心爽大地猶成七寳玄經山林草石皆有智慧能宣寳法何處應非玉京洞玄歩虚詠此題下即味七寳華葉法也心通玄道神詠歩虚遊履經法學者神悟曰經也觀隨聲遊故曰詠也稽首禮者稽首有三如常解今此中旣是咽味吟咏之㫖冝從心葉解釋也太上洞玄歩虚經詠第一稽首禮太上燒香歸虚无流明隨我迴法輪亦三周玄元四大興靈慶及王侯七祖生天堂煌煌耀景敷嘯歌觀太漠天樂適我娯齊馨无上德下仙不與儔妙想明玄覺詵詵廵虚遊稽首禮太上稽開也首心也禮體也開心體令太上智慧火燒身相皆盡淨焼香歸虚无者焼消滅也消滅衆相香淨自歸虚无也虚无非歸於太上太上自歸之故云流明隨我迴我者我即成太上法輪亦三周以此合太上即轉三法輪周竟玄元四大興玄元遂也我之四大隆盛與玄道合常也靈慶及王侯靈智慶合可以養親可以適君可以利物故及王侯也故七祖生天堂煌煌耀景敷也嘯歌觀太漠歌詠靈智之音也一音羅罩觀於太漠之道道合之歡自然合天樂天樂適我娯也齊馨无上德馨受也七祖及君人同我受无上德也非下仙之儔類故也妙想合衆妙无事故玄覺也詵詵濟濟衆美廵虚而逍遥遊也第二旋行躡雲綱乗虚歩玄紀吟咏帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花蕭然靈風起宿願定命根故致標髙擬懽樂太上前萬劫猶未始旋行躡雲綱旋虚而行行忘也足躡法雲之綱紀乗虚歩玄紀也吟咏通性也性通則帝一尊自合我身百關全而歸之百關身骨百節也調適自合至理也俯命八海童會萬物以爲己體故八方性海一嬰童也童无心也天人所仰賴仰携髙仙子也諸天散香花天上地下散眞法華也境隨心爽玉書應境生也蕭然靈風起蕭然者靈覺之風蕭蕭然起也宿願定命根无量劫來宿集之願靈智无邊誓願解悟如此則命根久定今當受之故致標髙擬髙擬今得之也今得太上在我心前道果无邊誓願得遂故懽樂合常繼之萬劫猶未始解常也第三嵯峨玄都山十方宗皇一岧岧天寳臺光明熖流日緯燁玉華林蒨璨耀朱實常念餐元精鍊液固形質金光散紫微窈窕玄都逸嵯峨玄都山說境淨法體嵯峨玄道都會法山也十方宗皇一皇一智淨之心尊也悟則識攝包十方玄都同宗歸皇一之尊也岧岧天寳臺會萬物爲己身也境智一照光明熖流日也日月之光翳然无用日光度也下釋云緯燁玉林華蒨粲曜朱實是也常念餐元精却述習觀時也元精靈智也日觀練爽易死炁故根形質遂成金光法體散煥我身生紫微之宅窈窕在玄都舍遊逸後人改爲大乗者愚之極也乗是運載之趣向也玄都是至道室宅之極場也以趣向信仰至之如人行時勞逸殊極也第四俯仰存太上華景秀丹田左顧提鬰儀右盻携結璘六度冠梵行道徳隨日新宿命積福慶聞經若至親天挺超世才樂誦希微篇沖虚太和氣吐納流霞津胎息靜百關寥寥究三便泥丸洞明景遂成金華仙魔王敬受事故能朝諸天皆從齋戒起累功結宿縁飛行淩太虚提携髙上人俯仰存太上此中諸章各别立觀門餐味吟詠之習門習門異者頌云景悟歸宗一是也章章自斷不相渉也今俯仰存太上者存心也形行有俯仰心行有存想行心得神妙妙想自攝形從神也存神順太上而動太上從神而行故俯仰之身等太上太上從神而歸我故華景秀丹田也左顧下舉鬱儀結璘等從覺智所携攝六度所冠盖盖爲梵行故道德隨日新而成也宿命積福慶者述能如上行者即是宿習來久今則尊重行至不退聞經如至親積福應也至親父母如人久離父母忽見之意也經爲法母道爲法父遇之則忻適尊重而行有宿命天挺超世才故樂誦希微之二篇也无聲曰希无形曰微若无宿習繫持業力故不信經聞知不聞縱使行之少時即退无制持力也沖虚太和炁述正觀習也沖心也心得沖虛太和之妙炁吐納流照霞津灌我身也亦名胎息如胎之定如息无心虚而安養靜百關也靜則寥寂其心了了明照究三界之便門也泥丸无爲也无爲洞明於内光景明照於外眞常盛明之道故遂成金華仙也自然使魔王尊敬而受事故能朝會於諸天皆從齋戒起却述初因宿習積萬善於曠劫蕩元始之遺塵故得身等法界飛行淩太虚也攝會麤妙提携髙上人也第五控轡適十方旋憩玄景阿仰觀劫仭臺俯盼紫雲羅逍遥太上京相與坐蓮花積學爲眞人恬然榮衛和永享無期夀萬椿奚足多控轡適十方控身轡心也即以身從心而淨心轡身而行乗之而適十方周遍故旋憩止息坐玄道之景阿房之中仰觀身心坐劫仭之臺俯視迴明爲紫雲之所羅盖紫雲靈智極法法雲之色也坐之而逍遙處太上玊京之場也聖友俱會相與坐蓮華也積學爲眞人却述宿習來久而今故得恬然榮衛和榮衞之法寳智和恬胃府内和明也永得享受无窮无竟之夀非萬椿何足比故奚足多也第六大道師玄寂昇僊友無英公子度靈符太一捧洞章舍利曜金姿龍駕歘來迎天尊盻雲輿飄飄乗虛翔香花若飛雪氛靄茂玄梁頭腦禮金闕携手遨玉京大道師玄寂求大道者冝用玄寂之境爲師師寂境於外得无爲於内寂境即是无爲无爲即是寂境此得大道也此即寂境爲師也故昇仙友无英旣與无英爲友靈符自轉在我也无英公子天眞號也太乙帝君以洞章奉我也洞章天中音也舍利骨也洞章灌我骨相骨相成金容之姿也龍駕歘然空中來迎縱轡而遊天尊携盻於我雲輿飄飄與我乗虚而同翔也香華亘空界如飛雪氛氛晻藹茂美玄道之髙梁頭腦禮在金闕内天尊携提執手遨遊坐玉京也第七騫樹玄景園煥爛七寳林天獸三百名獅子巨萬尋飛龍躑躅鳴神鳯應節吟靈風扇竒花清香散人衿自無髙仙才焉能耽此心騫樹玄景園景隨心淨故景成七寳騫樹今即說景之妙亦是心妙乃設心智而說景故云玄景園妙心照圓淨之景寳成七寳鶱樹法界之園囿故云煥爛七寳林天獸三百名自然法獸現於色像爲法王獅子自在故有獅子之名三百名及巨萬尋者皆趣舉員數耳至於名實無數體大無窮也下列飛龍神鳯皆天獸别名也靈鳳扇下即說妙智也靈智朗淨威風竒勢扇萬景而成光淨之法香華散人衿於境界也下文解岀自無有髙仙大聖之才智焉能有耽玩如此之心也第八嚴我九龍駕乘虚以逍遥八天如指掌六合何足遼衆仙誦洞經太上唱清謡香花隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寳囿興此大法橋嚴我九龍駕嚴我者以靈寳正智嚴裝洗飾我五根四心即成六通三明以坦衆麤之夷塗故九龍駕也故云乗虚以逍遥八天如指掌六合何足遼乗順會萬物爲一體衆仙太上尊師良友不期自會盡唱誦空洞謡歌而成教也故云香花隨風散玉音成紫霄紫霄景界色悉成經故五苦之在一時隨經迸散亦成經也八難亦然故云妙哉靈寳囿興此大法橋第九天眞帝一宫靄靄冠耀靈流煥法輪綱旋空入無形虚皇撫雲璈衆眞誦洞經髙仙拱手讃彌劫保利貞天眞帝一宫宫身也體自然之道故爲天眞自處眞帝至一之宅宅帝一宅也藹藹之體周冠曜靈也身之法體流光煥爛爲法橋網紀也輪轉合虚无大道旋空入无形也虚皇衆眞歘然而至爲大師友撫雲璈而歌齊誦洞經而成於我也髙仙歛手讃慶成也彌劫保利貞合常也第十至眞無所待時或轡飛龍長齋會玄都鳴玉扣瓊鐘十華諸仙集紫烟結成宫寳盖羅太上眞人把芙蓉散華陳我願握節徴魔王法鼓會群仙靈唱靡不同無可無不可思與希微通至眞无所待時或轡飛龍體洽於至眞故能无物而不乗无形而不載故无所待也時或轡飛龍也長齋洗心旣淨自然玄會於玄都鳴玉扣瓊鐘者有召其法鼓自然鳴也十華下即衆聖應而會集也吐紫烟自成自然宫觀也寳盖者法冠蓋以會太上自有无量眞仙把芙蓉法華幢盖供養空生也皆散法智之華陳列成我宿願宿願成智慧无邊誓願解今陳其願得遂也握節徵魔王亦遂願斷事也法鼓者即法智之鼓攝會群神靈唱靡不同也故有无可无不可思與希微通内明則外用故内思自通希微也洞玄靈寳昇玄歩虚章序䟽終
