front:
  text: 洞玄靈寳昇玄歩虚章序䟽養八昇玄是妙覺之通名歩虛是神造之員極昇則證實不差玄則冥同至德歩是通渉之名虚是縱絕之稱又云章者煥輝敞露讃法體之滂流乃有玄音纔吐而八表咸和神韻再敷則十華競集旋玄都以擲靈躡雲綱而携契信是怡神滌志之法埸解形隳心之妙處也故言昇玄歩虚章又云太上說玄都玉京山經者太上聖人之假號能說成法也玉京喻法體也法本無言亦無形相今則假玄都名相說法故有說玉京山及城臺等經是洞玄第三部靈寳第八卷所以次空洞者空洞即是諸天通讃法體周圓識古今之一揆括麤妙以同徒故次此文太上通結述成號大淨法門之讃也乃顯縁教之大體朗妙覺之同徒故以法法盡是玉京物物咸書道徳又云玉京即法體玄同也都號也同號三千大千世界爲一玉京山爲此境界太上住處又爲人心神住處故説之爲教名體教誨於心神心神覺悟時名覺悟迷時名迷智時名智敬使相稱爲人法故說爲經經由津通義也理因說解說因理生學者神悟便以經爲名玉淨也京大也說玄都爲大淨之理故法體也太上是人玄都玉京是法亦是境智說境及境處俱名爲衆寳說智及智處俱名爲靈寳故云説玄都玉京山經就此卷爲四等第一舉玄都爲道境以建法體依相以解教方述結從理起用第二示修行方法第三列十頌以讃法體結述從外入理之意第四散擲廣誦法法皆正以示得失流通太上曰夫玄都玉京山即説辭也冠八方者山有四面四維四垂故有八方也是天地境界住處有列世界比地形有上中下三玄都山名亦曰三大環山大環即冠羅盖八方諸天周盡在内初下小玄都即八方比世界八天下爲一世界一環山籠裏之重疊上數至一千即爲一小千世界即四方安之又一籠籠之即爲一中世界重上數至千即爲一中千世界又四方安之更一籠籠之即爲一大千世界重上數至千即一冠籠山總望中下名爲三千大千世界是也此即冠八方法羅天以七寳爲體亦名寳聚故曰玉京此以寄相明解美之髙妙以目靈寳法體周觀洞虚故其山自然生七寳之樹說山名非樹說也以樹爲體亦名道樹唯一株枝葉羅覆敷布皆周故云法羅天也即大道君治化行坐之處法界處道場處安神處說法處非離眞而立處處即眞也遍世間無有一處是空閑三毒四到靈津法海六情五隂玉京山髙仙之玄都萬聖同會亦大道君聖人也今萬物以爲己體者其唯聖人乎故云法大聖天尊帝王髙仙上眞各持齋奉法宗太上於此也齋者洗心曰齋日時也亦以心淨覺照爲日時也並我淨則無所不淨也夫號太上玄都即其義也焼自然旃檀反生靈香即神香也境界淨也飛仙散華一切法爲華也旋繞周歌空洞靈章也諸天奏百千衆音亂會也此盖妙說皆靈覺法體中事但慿文自了山有十號號法體旣有十名一義耳一名盖天首山其山法性眞空羅於今古爲
